seed: 20260312
parallel_workers: 6
num_rounds: 2
samples_per_round: 100
shared_color_palette_json: ./web_standard_colors.json

canvas:
  width: 2048
  height: 2048
  min_width: 2048
  max_width: 3072
  min_height: 2048
  max_height: 3072
  short_edge_min: 2048
  short_edge_max: 3072
  aspect_ratios:
    - "1:1"
    - "2:3"
    - "3:2"
    - "3:4"
    - "4:3"
    - "9:16"
    - "16:9"
  margin: 72
  min_text_bg_contrast_ratio: 4.0
  background_colors:
    - "#000000"
    - "#FFFFFF"
    - "#808080"
    - "#C0C0C0"
    - "#800000"
    - "#FF0000"
    - "#800080"
    - "#FF00FF"
