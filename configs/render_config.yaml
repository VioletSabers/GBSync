text:
  max_font_size: 160
  min_font_size: 50
  line_spacing: 10
  paragraph_spacing: 84
  min_segments_per_image: 1
  max_segments_per_image: 8
  min_corpus_units_per_segment: 2
  max_corpus_units_per_segment: 6
  emoji_insert_probability: 0.5
  min_emojis_between_segments: 0
  max_emojis_between_segments: 3
  layout_modes:
    - full_text
    - title_body
    - dual_column
    - vertical
  layout_mode_weights:
    full_text: 0.45
    title_body: 0.2
    dual_column: 0.2
    vertical: 0.15
  default_text_colors:
    - "#000000"
    - "#FFFFFF"
    - "#808080"
    - "#C0C0C0"
    - "#800000"
    - "#FF0000"
    - "#800080"
    - "#FF00FF"
    - "#008000"
    - "#00FF00"
    - "#808000"
    - "#FFFF00"
    - "#000080"
    - "#0000FF"
    - "#008080"
    - "#00FFFF"
    - "#F5F5F5"
    - "#101010"
    - "#FFD54F"
    - "#80DEEA"
    - "#EF4444"
    - "#F97316"
    - "#22C55E"
    - "#14B8A6"
    - "#3B82F6"
    - "#8B5CF6"
    - "#EC4899"
    - "#EAB308"
    - "#F43F5E"
    - "#0EA5E9"
  style_templates:
    title_body:
      title:
        corpus_type: chinese
        min_font_size: 220
        max_font_size: 340
        bold_probability: 0.25
        italic_probability: 0.0
      body:
        corpus_type: chinese
        min_font_size: 150
        max_font_size: 260
        bold_probability: 0.05
        italic_probability: 0.05

output:
  root_dir: ../output
  image_dir: images
  parquet_dir: parquet

corpus_sources:
  - path: ../sample_data/chinese_gb_8105.jsonl
    corpus_type: chinese
    sample_weight: 10.0
  - path: ../sample_data/chinese_xinhua_words.jsonl
    corpus_type: chinese
    sample_weight: 10.0
  - path: ../sample_data/chinese_news_simplified_github_300k.jsonl
    corpus_type: chinese
    sample_weight: 0.2
  - path: ../sample_data/chinese_continuous_github_300k.jsonl
    corpus_type: chinese
    sample_weight: 1
  - path: ../sample_data/english_common_5000.jsonl
    corpus_type: english
    sample_weight: 10
  - path: ../sample_data/english_continuous_github_300k.jsonl
    corpus_type: english
    sample_weight: 1.0

font_category: simple
