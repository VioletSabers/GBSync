    - "#EF4444"
    - "#F97316"
    - "#22C55E"
    - "#14B8A6"
    - "#3B82F6"
    - "#8B5CF6"
    - "#EC4899"
    - "#EAB308"
    - "#F43F5E"
    - "#0EA5E9"
  style_templates:
    title_body:
      title:
        corpus_type: chinese
        min_font_size: 40
        max_font_size: 70
        bold_probability: 0.25
        italic_probability: 0.0
      body:
        corpus_type: chinese
        min_font_size: 25
        max_font_size: 40
        bold_probability: 0.05
        italic_probability: 0.05

output:
  root_dir: ../output_top_align_title_body
  image_dir: images
  parquet_dir: parquet

corpus_sources:
  - path: ../sample_data/chinese_gb_8105.jsonl
    corpus_type: chinese
    sample_weight: 10.0
  - path: ../sample_data/chinese_xinhua_words.jsonl
    corpus_type: chinese
    sample_weight: 10.0
  - path: ../sample_data/chinese_news_simplified_github_300k.jsonl
    corpus_type: chinese
    sample_weight: 0.2
  - path: ../sample_data/chinese_continuous_github_300k.jsonl
    corpus_type: chinese
    sample_weight: 1
  - path: ../sample_data/english_common_5000.jsonl
    corpus_type: english
    sample_weight: 10
  - path: ../sample_data/english_continuous_github_300k.jsonl
    corpus_type: english
    sample_weight: 1.0

font_category: simple
fonts_by_corpus_by_category:
  simple:
    chinese:
      - "../font/common/NotoSansSC.ttf"
      - "../font/common/NotoSerifSC.ttf"
      - "../font/common/ZCOOLXiaoWei.ttf"
