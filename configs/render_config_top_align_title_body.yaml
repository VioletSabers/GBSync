  min_font_size: 50
  line_spacing: 10
  paragraph_spacing: 84
  min_segments_per_image: 3
  max_segments_per_image: 6
  min_corpus_units_per_segment: 18
  max_corpus_units_per_segment: 48
  emoji_insert_probability: 0.5
  min_emojis_between_segments: 0
  max_emojis_between_segments: 3
  layout_modes:
    - title_body
  layout_mode_weights:
    title_body: 1.0
  layout_variants_by_mode:
    title_body:
      - top_left
      - top_center
      - top_right
  default_text_colors:
    - "#000000"
    - "#FFFFFF"
    - "#808080"
    - "#C0C0C0"
    - "#800000"
    - "#FF0000"
    - "#800080"
    - "#FF00FF"
    - "#008000"
    - "#00FF00"
    - "#808000"
    - "#FFFF00"
    - "#000080"
    - "#0000FF"
    - "#008080"
    - "#00FFFF"
    - "#F5F5F5"
    - "#101010"
    - "#FFD54F"
